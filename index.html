<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>編織定價計算</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#92400e">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        input, select, button { font-size: 16px !important; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800">

    <div class="max-w-xl mx-auto bg-white min-h-screen">

        <!-- Header -->
        <div class="bg-amber-800 text-white p-6 text-center sticky top-0">
            <h1 class="text-2xl font-bold">🧶 編織作品定價系統</h1>
            <p class="text-amber-200 text-sm">自動儲存 · 即時計算</p>
        </div>

        <div class="p-5 space-y-8 pb-10">

            <!-- 基本資料 -->
            <div>
                <h2 class="text-lg font-semibold mb-4">📋 基本資料</h2>
                <input type="text" id="projectName" oninput="saveToLocalStorage()" 
                       class="w-full border border-stone-300 rounded-2xl px-4 py-3" placeholder="作品名稱">
                
                <div class="mt-6">
                    <label class="block text-sm font-medium mb-2">上傳成品照片</label>
                    <input type="file" id="productImage" accept="image/*" class="w-full">
                    <div id="imagePreviewContainer" class="mt-4 hidden">
                        <img id="imagePreview" class="w-full rounded-3xl shadow" alt="預覽">
                    </div>
                </div>
            </div>

            <!-- 成本項目 -->
            <div>
                <h2 class="text-lg font-semibold mb-4">💰 成本項目</h2>

                <!-- 1. 棉繩 -->
                <div class="mb-8">
                    <label class="block text-sm font-medium mb-2">1. 棉繩花費</label>
                    <div class="flex gap-3">
                        <input type="text" id="ropeFormula" oninput="calculateRope()" 
                               class="flex-1 border border-stone-300 rounded-2xl px-4 py-3" placeholder="50*3 + 20">
                        <button onclick="calculateRope()" 
                                class="bg-amber-700 text-white px-8 rounded-2xl">計算</button>
                    </div>
                    <p class="text-right mt-2 text-sm">棉繩小計：$<span id="ropeTotalDisplay" class="font-bold">0</span></p>
                </div>

                <!-- 2. 配件（已修正即時更新） -->
                <div class="mb-8">
                    <label class="block text-sm font-medium mb-2">2. 配件</label>
                    <select id="accessoryType" onchange="toggleAccessoryField()" 
                            class="w-full border border-stone-300 rounded-2xl px-4 py-3 bg-white">
                        <option value="none">-- 請選擇配件 --</option>
                        <option value="金屬釦">金屬釦</option>
                        <option value="珍珠">珍珠</option>
                        <option value="木球">木球</option>
                        <option value="木圈">木圈</option>
                        <option value="木棍">木棍</option>
                        <option value="金屬圈">金屬圈</option>
                        <option value="其他">其他</option>
                    </select>
                    
                    <div id="accessoryPriceDiv" class="mt-4 hidden grid grid-cols-2 gap-3">
                        <input type="text" id="accessoryNote" placeholder="配件名稱" oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3">
                        <input type="number" id="accessoryPrice" placeholder="金額" oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3" min="0">
                    </div>
                    <p class="text-right mt-3 text-sm text-stone-600">配件小計：$<span id="accessoryTotalDisplay" class="font-bold">0</span></p>
                </div>

                <!-- 3. 包裝（已修正即時更新） -->
                <div class="mb-8">
                    <label class="block text-sm font-medium mb-2">3. 包裝耗材</label>
                    <select id="packagingType" onchange="togglePackagingField()" 
                            class="w-full border border-stone-300 rounded-2xl px-4 py-3 bg-white">
                        <option value="none">-- 請選擇包裝 --</option>
                        <option value="包裝">包裝（固定金額）</option>
                        <option value="其他">其他（自訂）</option>
                    </select>

                    <div id="packagingSelectDiv" class="mt-4 hidden">
                        <select id="packagingPriceSelect" onchange="calculateTotalPrice()" 
                                class="w-full border border-stone-300 rounded-2xl px-4 py-3 bg-white">
                            <option value="10">$10</option>
                            <option value="20">$20</option>
                            <option value="30">$30</option>
                            <option value="40">$40</option>
                        </select>
                    </div>

                    <div id="packagingOtherDiv" class="mt-4 hidden grid grid-cols-2 gap-3">
                        <input type="text" id="packagingNote" placeholder="備註" oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3">
                        <input type="number" id="packagingPriceInput" placeholder="金額" oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3" min="0">
                    </div>
                    <p class="text-right mt-3 text-sm text-stone-600">包裝小計：$<span id="packagingTotalDisplay" class="font-bold">0</span></p>
                </div>

                <!-- 4. 工時 -->
                <div>
                    <label class="block text-sm font-medium mb-2">4. 製作時間（$100/小時）</label>
                    <div class="flex items-center gap-3">
                        <input type="number" id="workHours" oninput="calculateTotalPrice()" 
                               class="flex-1 border border-stone-300 rounded-2xl px-4 py-3" placeholder="0" step="0.5" min="0">
                        <span class="text-stone-600">小時</span>
                    </div>
                </div>
            </div>

            <!-- 計算按鈕 -->
            <button onclick="calculateTotalPrice()" 
                    class="w-full bg-amber-800 text-white py-4 rounded-3xl text-lg font-semibold mt-6">
                計算總成本與建議售價
            </button>

            <!-- 計算結果 -->
            <div class="mt-10 bg-stone-50 rounded-3xl p-6 border border-stone-200">
                <h2 class="text-xl font-semibold mb-6 text-center">💰 計算結果</h2>
                
                <div class="space-y-4 text-lg">
                    <div class="flex justify-between">
                        <span class="text-stone-600">總成本</span>
                        <span class="font-bold">$<span id="resTotalCost">0</span></span>
                    </div>
                    <div class="flex justify-between">
                        <span>棉繩</span>
                        <span>$<span id="resRope">0</span></span>
                    </div>
                    <div class="flex justify-between">
                        <span>配件</span>
                        <span>$<span id="resAccessory">0</span></span>
                    </div>
                    <div class="flex justify-between">
                        <span>包裝</span>
                        <span>$<span id="resPackaging">0</span></span>
                    </div>
                    <div class="flex justify-between">
                        <span>人工成本</span>
                        <span>$<span id="resWage">0</span></span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-8">
                    <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
                        <div class="text-amber-600 text-sm">一般定價 (1.5倍)</div>
                        <div id="priceNormal" class="text-4xl font-bold text-amber-800">0</div>
                    </div>
                    <div class="bg-white rounded-2xl p-4 text-center shadow-sm">
                        <div class="text-amber-600 text-sm">精緻定價 (2.0倍)</div>
                        <div id="pricePremium" class="text-4xl font-bold text-amber-800">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 圖片預覽
        document.getElementById('productImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('imagePreview').src = ev.target.result;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        function toggleAccessoryField() {
            const val = document.getElementById('accessoryType').value;
            document.getElementById('accessoryPriceDiv').classList.toggle('hidden', val === 'none');
            calculateTotalPrice();
        }

        function togglePackagingField() {
            const val = document.getElementById('packagingType').value;
            document.getElementById('packagingSelectDiv').classList.toggle('hidden', val !== '包裝');
            document.getElementById('packagingOtherDiv').classList.toggle('hidden', val !== '其他');
            calculateTotalPrice();
        }

        function calculateRope() {
            const formula = document.getElementById('ropeFormula').value.trim();
            let total = 0;
            if (formula) {
                try { total = eval(formula.replace('×','*').replace('÷','/')); } catch(e) {}
            }
            document.getElementById('ropeTotalDisplay').textContent = Math.round(total);
            calculateTotalPrice();
        }

        function calculateTotalPrice() {
            const rope = parseFloat(document.getElementById('ropeTotalDisplay').textContent) || 0;
            
            // 配件
            let accessory = 0;
            if (document.getElementById('accessoryType').value !== 'none') {
                accessory = parseFloat(document.getElementById('accessoryPrice').value) || 0;
            }
            document.getElementById('accessoryTotalDisplay').textContent = accessory;

            // 包裝
            let packaging = 0;
            const pType = document.getElementById('packagingType').value;
            if (pType === '包裝') {
                packaging = parseFloat(document.getElementById('packagingPriceSelect').value) || 0;
            } else if (pType === '其他') {
                packaging = parseFloat(document.getElementById('packagingPriceInput').value) || 0;
            }
            document.getElementById('packagingTotalDisplay').textContent = packaging;

            const hours = parseFloat(document.getElementById('workHours').value) || 0;
            const wage = hours * 100;
            const totalCost = rope + accessory + packaging + wage;

            // 更新結果區
            document.getElementById('resRope').textContent = rope;
            document.getElementById('resAccessory').textContent = accessory;
            document.getElementById('resPackaging').textContent = packaging;
            document.getElementById('resWage').textContent = wage;
            document.getElementById('resTotalCost').textContent = totalCost;
            document.getElementById('priceNormal').textContent = Math.round(totalCost * 1.5);
            document.getElementById('pricePremium').textContent = Math.round(totalCost * 2);
        }

        function saveToLocalStorage() {
            localStorage.setItem('weavingCalc', JSON.stringify({
                projectName: document.getElementById('projectName').value,
                ropeFormula: document.getElementById('ropeFormula').value,
                workHours: document.getElementById('workHours').value
            }));
        }

        window.onload = () => {
            const saved = localStorage.getItem('weavingCalc');
            if (saved) {
                const d = JSON.parse(saved);
                document.getElementById('projectName').value = d.projectName || '';
                document.getElementById('ropeFormula').value = d.ropeFormula || '';
                document.getElementById('workHours').value = d.workHours || '';
            }
            calculateTotalPrice();
        };
    </script>
</body>
</html>
