<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>編織定價計算</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#92400e">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body, html { 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            overflow: hidden; height: 100%; 
        }
        input, select, button { font-size: 16px !important; }
        .main-content {
            height: calc(100vh - 380px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-stone-100">

    <div class="max-w-xl mx-auto bg-white h-screen flex flex-col shadow-xl">

        <!-- Header -->
        <div class="bg-amber-800 text-white p-5 text-center">
            <h1 class="text-2xl font-bold">🧶 編織作品定價系統</h1>
            <p class="text-amber-200 text-sm">手機版 · 自動儲存</p>
        </div>

        <!-- 主要內容 -->
        <div class="main-content p-5 space-y-8 flex-1 overflow-y-auto">
            
            <!-- 基本資料 -->
            <div>
                <h2 class="text-lg font-semibold text-stone-700 mb-3">📋 基本資料</h2>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium mb-1.5">作品名稱</label>
                        <input type="text" id="projectName" oninput="saveToLocalStorage()" 
                               class="w-full border border-stone-300 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-amber-600 focus:outline-none"
                               placeholder="例如：波西米亞編織包">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1.5">上傳成品照片</label>
                        <input type="file" id="productImage" accept="image/*" 
                               class="w-full text-sm text-stone-500 file:mr-4 file:py-3 file:px-6 file:rounded-2xl file:border-0 file:text-sm file:font-semibold file:bg-amber-50 file:text-amber-700 hover:file:bg-amber-100">
                        <div id="imagePreviewContainer" class="mt-4 hidden">
                            <img id="imagePreview" src="" alt="成品預覽" class="w-full max-h-60 object-cover rounded-3xl shadow-md">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 成本項目 -->
            <div>
                <h2 class="text-lg font-semibold text-stone-700 mb-3">💰 成本項目</h2>
                
                <!-- 棉繩 -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1.5">1. 棉繩花費</label>
                    <div class="flex gap-2">
                        <input type="text" id="ropeFormula" oninput="saveToLocalStorage()" 
                               class="flex-1 border border-stone-300 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-amber-600"
                               placeholder="50*3 + 20">
                        <button onclick="calculateRope(); calculateTotalPrice()" 
                                class="bg-amber-700 text-white px-6 rounded-2xl">計算</button>
                    </div>
                    <p class="text-right mt-1 text-sm text-stone-600">小計：$<span id="ropeTotalDisplay" class="font-semibold">0</span></p>
                </div>

                <!-- 配件（所有配件皆可自訂金額） -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1.5">2. 配件</label>
                    <select id="accessoryType" onchange="toggleAccessoryField(); calculateTotalPrice()" 
                            class="w-full border border-stone-300 rounded-2xl px-4 py-3 bg-white">
                        <option value="none">-- 請選擇配件 --</option>
                        <option value="金屬釦">金屬釦</option>
                        <option value="珍珠">珍珠</option>
                        <option value="木球">木球</option>
                        <option value="木圈">木圈</option>
                        <option value="木棍">木棍</option>
                        <option value="金屬圈">金屬圈</option>
                        <option value="其他">其他</option>
                    </select>
                    
                    <div id="accessoryPriceDiv" class="mt-4 hidden grid grid-cols-2 gap-3">
                        <input type="text" id="accessoryNote" placeholder="配件名稱 / 備註" 
                               oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3 text-sm">
                        <input type="number" id="accessoryPrice" placeholder="金額" 
                               oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3 text-sm" min="0">
                    </div>
                    
                    <p class="text-right mt-3 text-sm text-stone-600">配件小計：$<span id="accessoryTotalDisplay" class="font-semibold">0</span></p>
                </div>

                <!-- 包裝 -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-1.5">3. 包裝耗材</label>
                    <select id="packagingType" onchange="togglePackagingField(); calculateTotalPrice()" 
                            class="w-full border border-stone-300 rounded-2xl px-4 py-3 bg-white">
                        <option value="none">-- 請選擇包裝 --</option>
                        <option value="包裝">包裝（固定金額）</option>
                        <option value="其他">其他（自訂）</option>
                    </select>

                    <div id="packagingSelectDiv" class="mt-3 hidden">
                        <select id="packagingPriceSelect" onchange="calculateTotalPrice()" 
                                class="w-full border border-stone-300 rounded-2xl px-4 py-3 bg-white">
                            <option value="10">$10</option>
                            <option value="20">$20</option>
                            <option value="30">$30</option>
                            <option value="40">$40</option>
                        </select>
                    </div>

                    <div id="packagingOtherDiv" class="mt-3 grid grid-cols-2 gap-3 hidden">
                        <input type="text" id="packagingNote" placeholder="備註" oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3 text-sm">
                        <input type="number" id="packagingPriceInput" placeholder="金額" oninput="calculateTotalPrice()" 
                               class="border border-stone-300 rounded-2xl px-4 py-3 text-sm">
                    </div>
                    <p class="text-right mt-2 text-sm text-stone-600">包裝小計：$<span id="packagingTotalDisplay" class="font-semibold">0</span></p>
                </div>

                <!-- 工時 -->
                <div>
                    <label class="block text-sm font-medium mb-1.5">4. 製作時間（$100 / 小時）</label>
                    <div class="flex items-center gap-3">
                        <input type="number" id="workHours" oninput="calculateTotalPrice()" 
                               class="flex-1 border border-stone-300 rounded-2xl px-4 py-3" 
                               placeholder="0" min="0" step="0.5">
                        <span class="text-stone-600">小時</span>
                    </div>
                </div>
            </div>

            <div class="h-20"></div>
        </div>

        <!-- 固定結果區 -->
        <div class="bg-white border-t border-stone-200 shadow-2xl p-5">
            <h2 class="text-lg font-semibold mb-3">💰 計算結果</h2>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-amber-50 rounded-2xl p-3">
                    <div class="text-xs text-amber-700">總成本</div>
                    <div class="text-3xl font-bold text-amber-900">$<span id="resTotalCost">0</span></div>
                </div>
                <div class="space-y-2">
                    <div class="bg-stone-800 text-white rounded-2xl p-2 text-sm">
                        一般定價<br><span id="priceNormal" class="text-2xl font-bold">0</span>
                    </div>
                    <div class="bg-stone-800 text-white rounded-2xl p-2 text-sm">
                        精緻定價<br><span id="pricePremium" class="text-2xl font-bold">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('productImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(ev) {
                    document.getElementById('imagePreview').src = ev.target.result;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });

        function toggleAccessoryField() {
            const val = document.getElementById('accessoryType').value;
            const priceDiv = document.getElementById('accessoryPriceDiv');
            priceDiv.classList.toggle('hidden', val === 'none');
            calculateTotalPrice();
        }

        function togglePackagingField() {
            const val = document.getElementById('packagingType').value;
            document.getElementById('packagingSelectDiv').classList.toggle('hidden', val !== '包裝');
            document.getElementById('packagingOtherDiv').classList.toggle('hidden', val !== '其他');
            calculateTotalPrice();
        }

        function calculateRope() {
            const formula = document.getElementById('ropeFormula').value.trim();
            let total = 0;
            if (formula) {
                try { total = eval(formula.replace('×','*').replace('÷','/')); } catch(e) {}
            }
            document.getElementById('ropeTotalDisplay').textContent = Math.round(total);
            calculateTotalPrice();
        }

        function calculateTotalPrice() {
            const rope = parseFloat(document.getElementById('ropeTotalDisplay').textContent) || 0;
            
            let accessory = 0;
            if (document.getElementById('accessoryType').value !== 'none') {
                accessory = parseFloat(document.getElementById('accessoryPrice').value) || 0;
            }
            document.getElementById('accessoryTotalDisplay').textContent = accessory;

            let packaging = 0;
            const pType = document.getElementById('packagingType').value;
            if (pType === '包裝') packaging = parseFloat(document.getElementById('packagingPriceSelect').value) || 0;
            else if (pType === '其他') packaging = parseFloat(document.getElementById('packagingPriceInput').value) || 0;
            document.getElementById('packagingTotalDisplay').textContent = packaging;

            const hours = parseFloat(document.getElementById('workHours').value) || 0;
            const wage = hours * 100;
            const totalCost = rope + accessory + packaging + wage;

            document.getElementById('resTotalCost').textContent = totalCost;
            document.getElementById('priceNormal').textContent = Math.round(totalCost * 1.5);
            document.getElementById('pricePremium').textContent = Math.round(totalCost * 2);
        }

        function saveToLocalStorage() {
            localStorage.setItem('weavingCalculator', JSON.stringify({
                projectName: document.getElementById('projectName').value,
                ropeFormula: document.getElementById('ropeFormula').value,
                workHours: document.getElementById('workHours').value
            }));
        }

        window.onload = () => {
            const saved = localStorage.getItem('weavingCalculator');
            if (saved) {
                const d = JSON.parse(saved);
                document.getElementById('projectName').value = d.projectName || '';
                document.getElementById('ropeFormula').value = d.ropeFormula || '';
                document.getElementById('workHours').value = d.workHours || '';
            }
            calculateTotalPrice();
        };
    </script>
</body>
</html>
